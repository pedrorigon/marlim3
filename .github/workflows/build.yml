name: Build Marlim3

on:
  push:
    tags:
      - 'v*'  # Dispara quando uma tag de versão é criada (ex: v1.0.0, v2.1.3)

jobs:

  # ─────────────────────────────────────────────
  #  Test Python package with freshly compiled executable
  #  Builds executable, installs package, runs ALL tests
  # ─────────────────────────────────────────────
  test-python:
    name: Test Python Package (with compilation)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran g++ cmake

      - name: Build executable
        run: |
          cmake --preset gcc-release
          cmake --build --preset gcc-release -j$(nproc)

      - name: Copy executable to package directory
        run: cp build/Marlim3 marlim3/

      - name: Install package + dependencies
        env:
          MARLIM3_SKIP_BUILD: 1
        run: uv sync --locked --group dev

      - name: Lint with flake8
        run: |
          uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          uv run flake8 . --count --exit-zero --statistics

      - name: Run ALL tests (including simulation tests)
        run: uv run pytest -v --tb=short

  # ─────────────────────────────────────────────
  #  Linux  (manylinux2014 / CentOS 7 / glibc 2.17)
  #  Binário compatível com qualquer Linux glibc >= 2.17,
  #  incluindo ambientes HPC baseados em RHEL/CentOS 7.
  #
  #  Estratégia: o runner é ubuntu-latest (Node 20 funciona bem aqui).
  #  Apenas o step de compilação roda dentro do container manylinux2014
  #  via 'docker run', vinculando o workspace com -v.
  #  Isso evita o problema de Node 20 precisar de glibc >= 2.25 dentro
  #  do container CentOS 7 (glibc 2.17).
  # ─────────────────────────────────────────────
  build-linux:
    name: Build – Linux x64 (manylinux2014)
    runs-on: ubuntu-latest
    needs: test-python  # Only build if Python tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build (release) dentro do container manylinux2014
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -c "
              source /opt/rh/devtoolset-10/enable
              yum install -y cmake3 || true
              cd /workspace
              cmake3 --preset gcc-release || cmake --preset gcc-release
              cmake3 --build --preset gcc-release -j\$(nproc) || cmake --build --preset gcc-release -j\$(nproc)
            "

      - name: Verificar dependência de glibc
        run: objdump -p build/Marlim3 | grep GLIBC || true

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: Marlim3-linux-x64
          path: build/Marlim3

  # ─────────────────────────────────────────────
  #  Windows  (windows-latest, MSYS2/MinGW64)
  # ─────────────────────────────────────────────
  build-windows:
    name: Build – Windows x64
    runs-on: windows-latest
    needs: test-python  # Only build if Python tests pass
    defaults:
      run:
        shell: msys2 {0}   # todos os steps usam o shell MSYS2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar MSYS2 / MinGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make

      - name: Build (release)
        run: |
          cmake --preset mingw-release
          cmake --build --preset mingw-release -j$(nproc)

      - name: Verify executable
        run: |
          file build/Marlim3.exe
          ./build/Marlim3.exe 2>&1 | head -3

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: Marlim3-windows-x64
          path: build/Marlim3.exe

  # ─────────────────────────────────────────────
  #  macOS  (Apple Silicon)
  # ─────────────────────────────────────────────
  build-macos:
    name: Build – macOS ARM64
    runs-on: macos-14
    needs: test-python  # Only build if Python tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: brew install gcc cmake

      - name: Build (release)
        run: |
          # Find brew-installed GCC version
          GCC_VERSION=$(ls /opt/homebrew/bin/gcc-[0-9]* 2>/dev/null | grep -oE 'gcc-[0-9]+$' | grep -oE '[0-9]+' | sort -n | tail -1)
          if [ -z "$GCC_VERSION" ]; then
            echo "Error: No GCC version found from brew"
            exit 1
          fi
          echo "Using g++-${GCC_VERSION} and gfortran-${GCC_VERSION}"

          cmake --preset gcc-release \
            -DCMAKE_CXX_COMPILER="g++-${GCC_VERSION}" \
            -DCMAKE_Fortran_COMPILER="gfortran-${GCC_VERSION}" \
            -DCMAKE_CXX_FLAGS_RELEASE="-O3 -mcpu=native -ffp-contract=off -funroll-loops -DNDEBUG"
          cmake --build --preset gcc-release -j$(sysctl -n hw.ncpu)

      - name: Verify binary
        run: |
          file build/Marlim3
          lipo -info build/Marlim3
          otool -L build/Marlim3

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: Marlim3-macos-arm64
          path: build/Marlim3

  # ─────────────────────────────────────────────
  #  Release  – Publicar binários na GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: Criar Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    permissions:
      contents: write

    steps:
      - name: Baixar artefato Linux
        uses: actions/download-artifact@v4
        with:
          name: Marlim3-linux-x64
          path: artifacts/linux

      - name: Baixar artefato Windows
        uses: actions/download-artifact@v4
        with:
          name: Marlim3-windows-x64
          path: artifacts/windows

      - name: Baixar artefato macOS (ARM64)
        uses: actions/download-artifact@v4
        with:
          name: Marlim3-macos-arm64
          path: artifacts/macos-arm64

      - name: Renomear binários
        run: |
          mv artifacts/linux/Marlim3 artifacts/linux/Marlim3-linux-x64
          mv artifacts/macos-arm64/Marlim3 artifacts/macos-arm64/Marlim3-macos-arm64

      - name: Criar Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/linux/Marlim3-linux-x64
            artifacts/windows/Marlim3.exe
            artifacts/macos-arm64/Marlim3-macos-arm64
          draft: false
          prerelease: false
          generate_release_notes: true