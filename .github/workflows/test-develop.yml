name: Test Python Package

on:
  push:
    branches:
      - develop

jobs:

  # ─────────────────────────────────────────────
  #  Test Python package with freshly compiled executable
  #  Builds executable, installs package, runs ALL tests
  # ─────────────────────────────────────────────
  test-python:
    name: Test Python Package (with compilation)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran g++ cmake

      - name: Build executable
        run: |
          cmake --preset gcc-release
          cmake --build --preset gcc-release -j$(nproc)

      - name: Copy executable to package directory
        run: cp build/Marlim3 marlim3/

      - name: Install package + dependencies
        env:
          MARLIM3_SKIP_BUILD: 1
        run: uv sync --locked --group dev

      - name: Lint with flake8
        run: |
          uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          uv run flake8 . --count --exit-zero --statistics

      - name: Run ALL tests (including simulation tests)
        run: uv run pytest -v --tb=short
